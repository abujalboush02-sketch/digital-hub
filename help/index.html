<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Hub | M. Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#38bdf8',
                        dark: { bg: '#050505', text: '#FFFFFF', surface: '#111112', border: 'rgba(255, 255, 255, 0.08)', muted: '#71717a' },
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
        }

        input,
        textarea,
        select {
            background: #0c0c0d !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.2s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #38bdf8 !important;
            outline: none;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.1);
        }

        /* Custom select dropdown styling for dark mode */
        select option {
            background-color: #111112;
            color: #fff;
        }
    </style>
</head>

<body class="dark min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-accent/5 rounded-full blur-[120px] pointer-events-none">
    </div>

    <div class="w-full max-w-lg relative z-10">

        <div class="text-center mb-10">
            <div class="flex justify-center items-center gap-2 mb-4">
                <span class="text-accent font-bold text-3xl">M.</span>
                <span class="font-mono text-[10px] tracking-[0.2em] text-accent/50 uppercase mt-1">Support_Node</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-black tracking-tighter mb-2">How can we help?</h1>
            <p class="font-mono text-xs text-dark-muted uppercase tracking-widest">Submit a ticket to the central
                mainframe.</p>
        </div>

        <div
            class="bg-dark-surface border border-dark-border p-6 md:p-10 rounded-[2rem] shadow-2xl relative overflow-hidden">

            <div id="success-message"
                class="hidden absolute inset-0 bg-dark-surface flex flex-col items-center justify-center p-8 text-center z-20">
                <div
                    class="w-16 h-16 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center mb-6 text-3xl shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                    ✓</div>
                <h3 class="text-2xl font-bold mb-2">Ticket Logged</h3>
                <p class="text-sm text-dark-muted font-mono mb-8">Our automated systems have received your request. An
                    operative will review it shortly.</p>
                <button onclick="resetForm()"
                    class="px-6 py-3 border border-dark-border rounded-xl font-mono text-[10px] uppercase tracking-widest hover:bg-white/5 transition-colors">Submit
                    Another Request</button>
            </div>

            <div id="error-banner"
                class="hidden mb-6 bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-mono p-4 rounded-xl text-center">
            </div>

            <form id="support-form" class="space-y-5">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label
                            class="block text-[10px] font-mono text-dark-muted uppercase mb-2 tracking-widest pl-2">Your
                            Identity</label>
                        <input type="text" id="user_name" required placeholder="John Doe"
                            class="w-full p-4 rounded-xl text-sm">
                    </div>
                    <div>
                        <label
                            class="block text-[10px] font-mono text-dark-muted uppercase mb-2 tracking-widest pl-2">Comm_Link
                            (Email)</label>
                        <input type="email" id="user_email" required placeholder="john@example.com"
                            class="w-full p-4 rounded-xl text-sm">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-mono text-dark-muted uppercase mb-2 tracking-widest pl-2">Classification</label>
                    <select id="subject" required
                        class="w-full p-4 rounded-xl text-sm font-medium appearance-none cursor-pointer">
                        <option value="" disabled selected>Select an issue category...</option>
                        <option value="Technical Support">Technical Support / Bug Report</option>
                        <option value="Billing & Subscriptions">Billing & Subscriptions</option>
                        <option value="API Access">API Access & Key Generation</option>
                        <option value="Product Delivery">Missing Digital Asset Delivery</option>
                        <option value="General Inquiry">General Inquiry</option>
                    </select>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-mono text-dark-muted uppercase mb-2 tracking-widest pl-2">Transmission
                        Data</label>
                    <textarea id="message" required rows="5" placeholder="Please describe your issue in detail..."
                        class="w-full p-4 rounded-xl text-sm resize-none"></textarea>
                </div>

                <div class="pt-4 border-t border-dark-border mt-6">
                    <button type="submit" id="submit-btn"
                        class="w-full bg-accent text-black font-black py-4 rounded-xl uppercase tracking-widest text-xs hover:brightness-110 transition-all active:scale-95 shadow-lg shadow-accent/20">
                        Transmit_Payload
                    </button>
                </div>

            </form>
        </div>

        <p class="text-center text-[9px] font-mono text-dark-muted mt-8 uppercase tracking-widest">
            Average response time: &lt; 24 Earth Hours.
        </p>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // Use your actual Anon Key here
        const supabaseUrl = 'https://dvlabpioxtyyzvhzpmyc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2bGFicGlveHR5eXp2aHpwbXljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDY4NzUsImV4cCI6MjA4OTA4Mjg3NX0.fBM9r7WXpntVUM-qsBDQFlknRf2vMyIpJTp5ww9pzUM';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('support-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorBanner = document.getElementById('error-banner');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Lock UI
            submitBtn.disabled = true;
            submitBtn.innerText = "ESTABLISHING_LINK...";
            errorBanner.classList.add('hidden');

            const payload = {
                user_name: document.getElementById('user_name').value,
                user_email: document.getElementById('user_email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value,
                status: 'open'
            };

            try {
                // Insert into Supabase
                const { error } = await supabase.from('support_tickets').insert([payload]);

                if (error) throw error;

                // Show Success
                successMessage.classList.remove('hidden');

            } catch (err) {
                // Show Error
                errorBanner.innerText = `TRANSMISSION_FAILED: ${err.message}`;
                errorBanner.classList.remove('hidden');
            } finally {
                // Unlock UI
                submitBtn.disabled = false;
                submitBtn.innerText = "Transmit_Payload";
            }
        });

        // Global function to reset the form after success
        window.resetForm = () => {
            form.reset();
            successMessage.classList.add('hidden');
        };
    </script>
</body>

</html>
