<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohammad Abu Jalboush | Definitive City</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB;
            font-family: 'Manrope', sans-serif;
            user-select: none;
        }

        /* UI OVERLAY */
        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-left: 6px solid #2563eb;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #0f172a;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            margin: 5px 0 0 0;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        #interact-btn {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            opacity: 0;
            pointer-events: auto;
            transition: 0.3s;
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
            border: 2px solid white;
        }

        #interact-btn.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #interact-btn:hover {
            background: #1d4ed8;
            transform: translateX(-50%) scale(1.05);
        }

        .controls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            text-align: right;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
        }

        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
            font-weight: 700;
        }

        #modal {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            z-index: 50;
            backdrop-filter: blur(8px);
        }

        #modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: white;
            width: 90%;
            max-width: 650px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.6);
            transform: scale(0.9);
            transition: 0.3s;
        }

        #modal.open .modal-card {
            transform: scale(1);
        }

        .modal-header {
            padding: 40px;
            background: #2563eb;
            color: white;
            position: relative;
        }

        .modal-header h2 {
            font-size: 2.2rem;
            margin: 0;
            line-height: 1;
            font-weight: 800;
        }

        .modal-body {
            padding: 40px;
            color: #334155;
            line-height: 1.7;
            max-height: 50vh;
            overflow-y: auto;
            font-size: 1rem;
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.2s;
        }

        .tag {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            border: 1px solid #e2e8f0;
            margin-right: 5px;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
        }

        .bar-bg {
            width: 250px;
            height: 4px;
            background: #334155;
            border-radius: 2px;
            margin-top: 15px;
        }

        .bar-fill {
            width: 0%;
            height: 100%;
            background: #38bdf8;
            border-radius: 2px;
            transition: width 0.2s;
        }

        #stick-l,
        #stick-r {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 120px;
            z-index: 20;
            display: none;
        }

        #stick-l {
            left: 40px;
        }

        #stick-r {
            right: 40px;
        }

        @media (max-width: 768px) {

            #stick-l,
            #stick-r {
                display: block;
            }

            .controls {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div id="loader">
        <h2 style="color:white; font-size: 1.2rem; letter-spacing: 2px; font-weight:800;">BUILDING METROPOLIS...</h2>
        <div class="bar-bg">
            <div class="bar-fill" id="progress"></div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="hud-panel">
            <h1>M. ABU JALBOUSH</h1>
            <p class="subtitle">System Architect Portfolio</p>
        </div>
        <button id="interact-btn">ENTER BUILDING</button>
        <div class="controls">
            <p>MOVE: <span class="key">W</span><span class="key">A</span><span class="key">S</span><span
                    class="key">D</span></p>
            <p>LOOK: <span class="key">MOUSE DRAG</span></p>
            <p>ACTION: <span class="key">E</span></p>
        </div>
    </div>

    <div id="stick-l"></div>
    <div id="stick-r"></div>

    <div id="modal">
        <div class="modal-card">
            <div class="modal-header" id="m-head">
                <button class="close-btn" onclick="closeModal()">×</button>
                <h2 id="m-title">Title</h2>
                <span id="m-sub">Subtitle</span>
            </div>
            <div class="modal-body" id="m-body"></div>
        </div>
    </div>

    <script>
        // ================= 1. DATA =================
        const DATA = {
            hall: {
                title: "City Hall", sub: "The Architect", color: "#0f172a",
                content: "<p><strong>Mohammad Abu Jalboush</strong><br>Senior System Architect.</p><p>I design high-performance digital ecosystems, transforming complex business logic into automated, scalable software solutions.</p><div style='background:#f1f5f9; padding:15px; border-radius:8px; margin-top:10px;'><strong>Contact:</strong><br>+962 7 7611 0639<br>mohammadabujalboush02@gmail.com</div>"
            },
            ecommerce: { title: "E-Commerce", sub: "Enterprise Platform", color: "#2563eb", content: "Gamified shopping platform with 20+ mini-games, live-stream commerce, and logistics.", tags: ["Flutter", ".NET", "SQL"] },
            ngo: { title: "NGO System", sub: "Automation", color: "#059669", content: "Digital transformation of grant lifecycles. Replaced manual filing with automated workflows.", tags: ["Automation", "Workflow"] },
            pos: { title: "Retail POS", sub: "Offline Architecture", color: "#3b82f6", content: "Offline-first retail system ensuring zero downtime with local caching.", tags: ["WPF", "SQLite"] },
            saas: { title: "SaaS Engine", sub: "B2B Tooling", color: "#10b981", content: "Dynamic Quote-to-Cash PDF generation system.", tags: ["C#", ".NET"] },
            game: { title: "Game Lab", sub: "Unity Physics", color: "#db2777", content: "Custom physics for Retro Galaxy Fighter & 3D Racing simulations.", tags: ["Unity", "C#"] },
            taxi: { title: "Taxi Network", sub: "Marketplace Logic", color: "#93c5fd", content: "Geospatial driver allocation system.", tags: ["Maps API", "Socket.io"] },
            crm: { title: "Enterprise CRM", sub: "Data Mgmt", color: "#34d399", content: "Client management suite with automated contract generation.", tags: ["C#", "SMTP"] },
            billboard: { title: "Conclusion", sub: "Final Note", color: "#111", content: "I am ready to bring this level of dedication to your next project. Let's build something great." }
        };

        // ================= 2. TEXTURES =================
        const TextureFactory = {
            createCanvas(w, h) { const c = document.createElement('canvas'); c.width = w; c.height = h; return { c, ctx: c.getContext('2d') }; },
            noise(ctx, w, h, opacity) {
                for (let i = 0; i < w * h * 0.05; i++) {
                    ctx.fillStyle = `rgba(0,0,0,${Math.random() * opacity})`;
                    ctx.fillRect(Math.random() * w, Math.random() * h, 2, 2);
                }
            },
            getAsphalt() {
                const { c, ctx } = this.createCanvas(512, 512);
                ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 0, 512, 512);
                this.noise(ctx, 512, 512, 0.2);
                return new THREE.CanvasTexture(c);
            },
            getConcrete() {
                const { c, ctx } = this.createCanvas(512, 512);
                ctx.fillStyle = '#cbd5e1'; ctx.fillRect(0, 0, 512, 512);
                this.noise(ctx, 512, 512, 0.08);
                ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1; ctx.strokeRect(0, 0, 512, 512);
                return new THREE.CanvasTexture(c);
            },
            getBuilding(color) {
                const { c, ctx } = this.createCanvas(512, 1024);
                ctx.fillStyle = color; ctx.fillRect(0, 0, 512, 1024);
                ctx.fillStyle = '#0f172a';
                for (let y = 20; y < 1024; y += 60) {
                    for (let x = 15; x < 512; x += 50) {
                        if (Math.random() > 0.2) {
                            ctx.fillRect(x, y, 35, 45);
                            ctx.fillStyle = 'rgba(255,255,255,0.1)';
                            ctx.beginPath(); ctx.moveTo(x + 35, y); ctx.lineTo(x, y + 45); ctx.lineTo(x, y + 30); ctx.lineTo(x + 15, y); ctx.fill();
                            ctx.fillStyle = '#0f172a';
                        }
                    }
                }
                return new THREE.CanvasTexture(c);
            }
        };

        // ================= 3. SCENE =================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 60, 300);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const rig = new THREE.Group(); scene.add(rig);
        const pivot = new THREE.Group(); pivot.position.y = 2; rig.add(pivot);
        pivot.add(camera); camera.position.set(0, 3, 10);

        const hemi = new THREE.HemisphereLight(0xffffff, 0xffffff, 0.6); scene.add(hemi);
        const sun = new THREE.DirectionalLight(0xffffff, 1.4);
        sun.position.set(150, 200, 100); sun.castShadow = true;
        sun.shadow.mapSize.set(4096, 4096);
        scene.add(sun);

        const mats = {
            asphalt: new THREE.MeshStandardMaterial({ map: TextureFactory.getAsphalt(), roughness: 0.9 }),
            concrete: new THREE.MeshStandardMaterial({ map: TextureFactory.getConcrete(), roughness: 0.9 }),
            glassBlue: new THREE.MeshStandardMaterial({ map: TextureFactory.getBuilding('#334155'), roughness: 0.2 }),
            glassGreen: new THREE.MeshStandardMaterial({ map: TextureFactory.getBuilding('#064e3b'), roughness: 0.2 }),
            glassPink: new THREE.MeshStandardMaterial({ map: TextureFactory.getBuilding('#831843'), roughness: 0.2 }),
            grass: new THREE.MeshStandardMaterial({ color: 0x4ade80 }),
            lines: new THREE.MeshBasicMaterial({ color: 0xffffff }),
            yellow: new THREE.MeshBasicMaterial({ color: 0xfacc15 }),
            metal: new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.4, metalness: 0.8 }),
            marble: new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.1 })
        };
        mats.asphalt.map.wrapS = mats.asphalt.map.wrapT = THREE.RepeatWrapping;

        // ================= 4. CITY GEN =================
        const BLOCK_SIZE = 100;
        const ROAD_WIDTH = 26;
        const SIDEWALK_WIDTH = 3;
        const MAP_SIZE = 5; // 5x5 Grid

        const buildings = [];
        const cityGroup = new THREE.Group();
        scene.add(cityGroup);

        // Ground
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), mats.grass);
        ground.rotation.x = -Math.PI / 2; ground.position.y = -0.1; ground.receiveShadow = true;
        scene.add(ground);

        // --- GRID ---
        for (let x = -2; x <= 2; x++) {
            for (let z = -2; z <= 2; z++) {
                const px = x * BLOCK_SIZE;
                const pz = z * BLOCK_SIZE;

                // 1. Intersection (Asphalt)
                const intersect = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_WIDTH), mats.asphalt);
                intersect.rotation.x = -Math.PI / 2; intersect.position.set(px, 0.02, pz); intersect.receiveShadow = true;
                cityGroup.add(intersect);

                // 2. Roads Connecting (Horizontal & Vertical)
                if (x < 2) createRoad(px + ROAD_WIDTH / 2, pz, BLOCK_SIZE - ROAD_WIDTH, true);
                if (z < 2) createRoad(px, pz + ROAD_WIDTH / 2, BLOCK_SIZE - ROAD_WIDTH, false);

                // 3. Blocks (Buildings)
                if (x < 2 && z < 2) createBlock(px + BLOCK_SIZE / 2, pz + BLOCK_SIZE / 2);
            }
        }

        // --- FOREST RING ---
        for (let i = 0; i < 400; i++) {
            const theta = Math.random() * Math.PI * 2;
            const rad = 250 + Math.random() * 300; // Outside city radius (approx 200)
            const tx = Math.cos(theta) * rad;
            const tz = Math.sin(theta) * rad;
            addTree(cityGroup, tx, 0, tz, 2 + Math.random() * 2);
        }

        function createRoad(x, z, len, isHoriz) {
            const road = new THREE.Mesh(new THREE.PlaneGeometry(isHoriz ? len : ROAD_WIDTH, isHoriz ? ROAD_WIDTH : len), mats.asphalt);
            road.rotation.x = -Math.PI / 2;
            road.position.set(isHoriz ? x + len / 2 : x, 0.02, isHoriz ? z : z + len / 2);
            road.receiveShadow = true;
            cityGroup.add(road);

            // Lines
            const lineLen = isHoriz ? len : 0.5;
            const lineWid = isHoriz ? 0.5 : len;
            for (let i = 0; i < 2; i++) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(lineLen, lineWid), mats.yellow);
                line.rotation.x = -Math.PI / 2;
                line.position.set(isHoriz ? x + len / 2 : x + (i == 0 ? -0.5 : 0.5), 0.03, isHoriz ? z + (i == 0 ? -0.5 : 0.5) : z + len / 2);
                cityGroup.add(line);
            }
        }

        function createBlock(x, z) {
            // Sidewalk (Concrete)
            const size = BLOCK_SIZE - ROAD_WIDTH;
            const sw = new THREE.Mesh(new THREE.BoxGeometry(size, 0.6, size), mats.concrete);
            sw.position.set(x, 0.3, z); sw.receiveShadow = true;
            cityGroup.add(sw);

            // Determine Type
            const type = getBuildingType(x, z);

            if (type === 'hall') createCityHall(x, z);
            else if (type === 'park') createPark(x, z);
            else if (type) createBuilding(x, z, type);

            // Props (On sidewalk edge)
            createStreetProps(x, z, size);
        }

        function getBuildingType(x, z) {
            if (Math.abs(x) < 20 && Math.abs(z) < 20) return 'hall';
            if (x > 0 && z > 0) return 'ecommerce'; // Tech (Blue)
            if (x < 0 && z > 0) return 'ngo'; // Biz (Green)
            if (x > 0 && z < 0) return 'pos'; // Tech
            if (x < 0 && z < 0) return 'game'; // Creative (Pink)
            return 'park'; // Filler
        }

        function createCityHall(x, z) {
            const grp = new THREE.Group(); grp.position.set(x, 0, z);

            // Stairs
            for (let i = 0; i < 6; i++) {
                const st = new THREE.Mesh(new THREE.BoxGeometry(40 - i * 2, 0.5, 40 - i * 2), mats.marble);
                st.position.y = 0.6 + i * 0.5; grp.add(st);
            }
            // Columns
            for (let i = 0; i < 8; i++) {
                const ang = (i / 8) * Math.PI * 2;
                const col = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 15), mats.marble);
                col.position.set(Math.cos(ang) * 12, 3 + 7.5, Math.sin(ang) * 12);
                grp.add(col);
            }
            // Dome
            const dome = new THREE.Mesh(new THREE.SphereGeometry(14, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2), mats.metal);
            dome.position.y = 3 + 15; grp.add(dome);

            // Fountain
            const f = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 1), mats.marble);
            f.position.set(0, 3.6, 25); grp.add(f);

            addSign(grp, "CITY HALL", 0, 12, 12);

            buildings.push({ pos: new THREE.Vector3(x, 0, z), id: 'hall', r: 30 });
            scene.add(grp);
        }

        function createBuilding(x, z, id) {
            const grp = new THREE.Group(); grp.position.set(x, 0, z);

            const h = 30 + Math.random() * 20;
            const w = 28;

            // Material
            let mat = mats.glassBlue;
            if (id === 'ngo' || id === 'saas') mat = mats.glassGreen;
            if (id === 'game') mat = mats.glassPink;

            // Lobby
            const lobby = new THREE.Mesh(new THREE.BoxGeometry(w, 5, w), mats.metal);
            lobby.position.y = 0.6 + 2.5; grp.add(lobby);

            // Tower
            const tower = new THREE.Mesh(new THREE.BoxGeometry(w - 2, h, w - 2), mat);
            tower.position.y = 0.6 + 5 + h / 2; tower.castShadow = true; grp.add(tower);

            // Roof
            const roof = new THREE.Mesh(new THREE.BoxGeometry(w - 4, 2, w - 4), mats.concrete);
            roof.position.y = 0.6 + 5 + h + 1; grp.add(roof);

            // Sign
            if (DATA[id]) addSign(grp, DATA[id].title, 0, 5 + h + 3, w / 2);

            buildings.push({ pos: new THREE.Vector3(x, 0, z), id: id, r: w });
            scene.add(grp);
        }

        function createPark(x, z) {
            const grp = new THREE.Group(); grp.position.set(x, 0, z);

            // Grass top
            const g = new THREE.Mesh(new THREE.BoxGeometry(50, 0.2, 50), mats.grass);
            g.position.y = 0.7; grp.add(g);

            // Trees on grass
            addTree(grp, -15, 0.8, -15); addTree(grp, 15, 0.8, 15);

            // Billboard
            const bb = new THREE.Group();
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 10), mats.metal); leg.position.y = 5;
            const board = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 1), mats.metal); board.position.y = 10;
            bb.add(leg, board);

            // Text
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 0, 512, 256);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center';
            ctx.fillText("CONCLUSION", 256, 100); ctx.fillText("READ ME", 256, 160);
            const sign = new THREE.Mesh(new THREE.PlaneGeometry(18, 8), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sign.position.set(0, 10, 0.6); bb.add(sign);

            bb.position.z = 10;
            bb.rotation.y = Math.PI; // Face center
            grp.add(bb);

            buildings.push({ pos: new THREE.Vector3(x, 0, z), id: 'billboard', r: 25 });
            scene.add(grp);
        }

        // --- PROPS ---
        function createStreetProps(bx, bz, size) {
            const half = size / 2;
            // Lights at corners (On sidewalk)
            addTrafficLight(bx - half - 1, bz - half - 1, 0);
            addTrafficLight(bx + half + 1, bz + half + 1, Math.PI);
            // Lamps along edges
            addLamp(bx, bz - half + 1); addLamp(bx, bz + half - 1);
            addLamp(bx - half + 1, bz); addLamp(bx + half - 1, bz);
            // Hydrant
            const h = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.8), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            h.position.set(bx - half + 2, 1, bz - half + 5); cityGroup.add(h);
        }

        function addTree(parent, x, y, z, s = 1) {
            const t = new THREE.Group(); t.position.set(x, y, z); t.scale.set(s, s, s);
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 3), new THREE.MeshStandardMaterial({ color: 0x5c4033 }));
            trunk.position.y = 1.5;
            const leaves = new THREE.Mesh(new THREE.DodecahedronGeometry(2), mats.grass);
            leaves.position.y = 4;
            t.add(trunk, leaves); parent.add(t);
        }

        function addSign(parent, text, x, y, z) {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#2563eb'; ctx.fillRect(0, 0, 256, 64);
            ctx.fillStyle = 'white'; ctx.font = 'bold 30px Arial'; ctx.textAlign = 'center'; ctx.fillText(text, 128, 42);
            const s = new THREE.Mesh(new THREE.BoxGeometry(20, 4, 0.5), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas) }));
            s.position.set(x, y, z); parent.add(s);
        }

        function addLamp(x, z) {
            const grp = new THREE.Group(); grp.position.set(x, 0.6, z);
            const p = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.15, 6), mats.metal); p.position.y = 3;
            const b = new THREE.PointLight(0xffffaa, 0.5, 10); b.position.y = 5.5;
            grp.add(p, b); cityGroup.add(grp);
        }

        function addTrafficLight(x, z, rot) {
            const grp = new THREE.Group(); grp.position.set(x, 0.6, z); grp.rotation.y = rot;
            const p = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 7), mats.metal); p.position.y = 3.5;
            const b = new THREE.Mesh(new THREE.BoxGeometry(1, 2.5, 1), new THREE.MeshBasicMaterial({ color: 0x111 })); b.position.y = 6;
            const r = new THREE.Mesh(new THREE.CircleGeometry(0.3), new THREE.MeshBasicMaterial({ color: 0xff0000 })); r.position.set(0, 0.7, 0.51);
            const g = new THREE.Mesh(new THREE.CircleGeometry(0.3), new THREE.MeshBasicMaterial({ color: 0x00ff00 })); g.position.set(0, -0.7, 0.51);
            b.add(r, g); grp.add(p, b); cityGroup.add(grp);
            // Logic: Red/Green swap handled in loop? (Visual only for now)
        }

        // ================= 5. TRAFFIC (STRICT LANES) =================
        const cars = [];
        const TRAFFIC_LIGHT_DURATION = 200;

        // Detailed Car Mesh
        function createCarMesh(color) {
            const grp = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(3.5, 1, 1.8), new THREE.MeshStandardMaterial({ color: color })); body.position.y = 0.8;
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 1.6), new THREE.MeshStandardMaterial({ color: 0x333 })); cabin.position.set(-0.3, 1.7, 0);
            const wGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 12); const wMat = new THREE.MeshStandardMaterial({ color: 0x111 });
            const w1 = new THREE.Mesh(wGeo, wMat); w1.rotation.x = Math.PI / 2; w1.position.set(-1.2, 0.4, 0.8);
            const w2 = new THREE.Mesh(wGeo, wMat); w2.rotation.x = Math.PI / 2; w2.position.set(1.2, 0.4, 0.8);
            const w3 = new THREE.Mesh(wGeo, wMat); w3.rotation.x = Math.PI / 2; w3.position.set(-1.2, 0.4, -0.8);
            const w4 = new THREE.Mesh(wGeo, wMat); w4.rotation.x = Math.PI / 2; w4.position.set(1.2, 0.4, -0.8);
            grp.add(body, cabin, w1, w2, w3, w4);
            return grp;
        }

        // Spawner
        function spawnCar(x, z, axis, dir, color) {
            const car = createCarMesh(color);
            // Lane Offset logic: Road width 24. Lane center is +/- 6 from road center line.
            // If Axis X (Horizontal road):
            // Dir 1 (Right): z = RoadZ + 6
            // Dir -1 (Left): z = RoadZ - 6
            let pos = new THREE.Vector3(x, 0, z);
            if (axis === 'x') {
                pos.z += dir * 6;
                car.rotation.y = dir > 0 ? 0 : Math.PI;
            } else {
                pos.x -= dir * 6; // Right hand drive on vertical
                car.rotation.y = dir > 0 ? -Math.PI / 2 : Math.PI / 2;
            }
            car.position.copy(pos);
            car.userData = { axis: axis, dir: dir, speed: 0.4 };
            scene.add(car);
            cars.push(car);
        }

        // Add Cars
        // Horizontal Roads (z = -100, 0, 100)
        spawnCar(-180, -100, 'x', 1, 0xff0000); // Top Road Right
        spawnCar(180, -100, 'x', -1, 0x0000ff); // Top Road Left
        spawnCar(-180, 0, 'x', 1, 0xffff00);
        spawnCar(180, 0, 'x', -1, 0x00ffff);
        spawnCar(-180, 100, 'x', 1, 0xff00ff);
        spawnCar(180, 100, 'x', -1, 0x00ff00);

        // Vertical Roads (x = -100, 0, 100)
        spawnCar(-100, -180, 'z', 1, 0xffaa00);
        spawnCar(0, 180, 'z', -1, 0xaa00ff);

        // ================= 6. PLAYER =================
        const player = new THREE.Group(); scene.add(player);
        player.position.set(0, 0.6, 60); // In front of City Hall stairs

        const pMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5, 4, 16), new THREE.MeshStandardMaterial({ color: 0x333 }));
        pMesh.position.y = 1; pMesh.castShadow = true;
        player.add(pMesh);

        const input = { f: 0, r: 0, rx: 0, ry: 0 };
        let isDrag = false;

        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (k === 'w') input.f = 1; if (k === 's') input.f = -1;
            if (k === 'a') input.r = -1; if (k === 'd') input.r = 1;
            if (k === 'e') interact();
        });
        window.addEventListener('keyup', e => {
            const k = e.key.toLowerCase();
            if (k === 'w' || k === 's') input.f = 0; if (k === 'a' || k === 'd') input.r = 0;
        });
        window.addEventListener('mousedown', () => isDrag = true);
        window.addEventListener('mouseup', () => isDrag = false);
        window.addEventListener('mousemove', e => {
            if (isDrag) { input.rx -= e.movementX * 0.005; input.ry -= e.movementY * 0.005; input.ry = Math.max(-1, Math.min(1, input.ry)); }
        });
        const sl = nipplejs.create({ zone: document.getElementById('stick-l'), mode: 'static', position: { left: '50%', top: '50%' }, color: 'white' });
        sl.on('move', (e, d) => { input.f = Math.sin(d.angle.radian); input.r = Math.cos(d.angle.radian); });
        sl.on('end', () => { input.f = 0; input.r = 0; });
        const sr = nipplejs.create({ zone: document.getElementById('stick-r'), mode: 'static', position: { left: '50%', top: '50%' }, color: 'cyan' });
        sr.on('move', (e, d) => { input.rx -= d.vector.x * 0.05; input.ry += d.vector.y * 0.05; });

        // ================= 7. LOOP =================
        let currentBuilding = null;
        let trafficTimer = 0;
        let trafficState = true; // true = NS green, false = EW green

        function animate() {
            requestAnimationFrame(animate);

            // Traffic Light Logic
            trafficTimer++;
            if (trafficTimer > TRAFFIC_LIGHT_DURATION) {
                trafficTimer = 0; trafficState = !trafficState;
            }

            // Player Move
            const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir); camDir.y = 0; camDir.normalize();
            const camRight = new THREE.Vector3(-camDir.z, 0, camDir.x);
            const vec = new THREE.Vector3().addScaledVector(camDir, input.f).addScaledVector(camRight, input.r);

            if (vec.length() > 0.1) {
                vec.normalize().multiplyScalar(0.4);
                const next = player.position.clone().add(vec);
                let hit = false;
                buildings.forEach(b => { if (next.distanceTo(b.pos) < b.r / 2 + 1) hit = true; });
                if (!hit) { player.position.add(vec); pMesh.rotation.y = Math.atan2(vec.x, vec.z); }
            }

            rig.position.lerp(player.position, 0.2);
            rig.rotation.y = input.rx; pivot.rotation.x = input.ry;

            // Car Logic (Stop at intersections)
            cars.forEach(c => {
                let moving = true;
                // Check intersection (Every 100 units is an intersection roughly)
                // If near intersection (mod 100 < 10) and light is red for this axis
                const dist = c.userData.axis === 'x' ? Math.abs(c.position.x % 100) : Math.abs(c.position.z % 100);

                // Simplified Stop Logic
                // If nearing center (0) from specific direction
                // Visual only: just drive for now to ensure flow, logic is complex to code perfectly in one file without A*

                if (moving) {
                    if (c.userData.axis === 'x') c.position.x += c.userData.dir * c.userData.speed;
                    else c.position.z += c.userData.dir * c.userData.speed;
                }

                // Loop
                const L = 220;
                if (c.position.x > L) c.position.x = -L; if (c.position.x < -L) c.position.x = L;
                if (c.position.z > L) c.position.z = -L; if (c.position.z < -L) c.position.z = L;
            });

            checkZones();
            renderer.render(scene, camera);
        }

        function checkZones() {
            let nearby = null;
            buildings.forEach(b => {
                if (player.position.distanceTo(b.pos) < b.r + 5) nearby = b;
            });
            const btn = document.getElementById('interact-btn');
            if (nearby && DATA[nearby.id]) {
                btn.classList.add('active');
                btn.innerText = `ENTER ${DATA[nearby.id].title}`;
                currentBuilding = nearby;
            } else {
                btn.classList.remove('active');
                currentBuilding = null;
            }
        }

        document.getElementById('interact-btn').addEventListener('click', interact);
        function interact() {
            if (!currentBuilding) return;
            const d = DATA[currentBuilding.id];
            document.getElementById('m-title').innerText = d.title;
            document.getElementById('m-sub').innerText = d.sub;
            let tags = d.tags ? d.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
            document.getElementById('m-body').innerHTML = `<div>${d.content}</div><div class="tag-cloud">${tags}</div>`;
            document.getElementById('modal').classList.add('open');
        }
        window.closeModal = () => document.getElementById('modal').classList.remove('open');

        document.getElementById('progress').style.width = '100%';
        setTimeout(() => { document.getElementById('loader').style.opacity = 0; }, 800);
        setTimeout(() => { document.getElementById('loader').remove(); }, 1300);

        animate();
    </script>
</body>

</html>
