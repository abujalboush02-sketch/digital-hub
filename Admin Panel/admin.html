<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { accent: '#38bdf8', dark: { bg: '#050505', text: '#FFFFFF', surface: '#111112', border: 'rgba(255, 255, 255, 0.08)', muted: '#71717a' } } } } }

    <style>
        body {
            background-color: #050505;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease-in;
        }

        body.auth-cleared {
            opacity: 1;
            pointer-events: auto;
        }

        .tab-active {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.08);
            border-right: 3px solid #38bdf8;
        }

        input,
        textarea,
        select {
            background: #0c0c0d !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #38bdf8 !important;
            outline: none;
        }

        .feature-chip {
            animation: popIn 0.2s ease-out;
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        const supabase = createClient('https://dvlabpioxtyyzvhzpmyc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2bGFicGlveHR5eXp2aHpwbXljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDY4NzUsImV4cCI6MjA4OTA4Mjg3NX0.fBM9r7WXpntVUM-qsBDQFlknRf2vMyIpJTp5ww9pzUM');

        // --- SECURITY INIT ---
        const initSecurity = async () => {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (!session || error) window.location.replace('index.html');
            else { document.body.classList.add('auth-cleared'); showTab('overview'); }
        };
        initSecurity();
        window.executeLogout = async () => { document.body.classList.remove('auth-cleared'); await supabase.auth.signOut(); window.location.replace('index.html'); };

        const area = document.getElementById('content-area');
        const tabTitle = document.getElementById('tab-title');
        let currentFeatures = [];

        window.toggleMobileMenu = () => { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('sidebar-overlay').classList.toggle('hidden'); };

        // --- ROUTER ---
        window.showTab = (tab) => {
            document.querySelectorAll('aside nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`btn-${tab}`).classList.add('tab-active');
            tabTitle.innerText = tab.toUpperCase() + "_TERMINAL";
            if (window.innerWidth < 768) toggleMobileMenu();

            if (tab === 'overview') renderOverview();
            if (tab === 'orders') renderOrders();
            if (tab === 'access') renderAccess();
            if (tab === 'apiforge') renderApiForge();
            if (tab === 'products') renderProducts();
            if (tab === 'portfolio') renderPortfolio();
            if (tab === 'promos') renderPromos();
            if (tab === 'command') renderCommand();
            if (tab === 'finance') renderFinance();
            if (tab === 'support') renderSupport();
            if (tab === 'settings') renderSettings();
        };

        // --- 00_OVERVIEW (THE MASTER DASHBOARD) ---
        async function renderOverview() {
            area.innerHTML = `<div class="animate-pulse font-mono text-xs text-dark-muted">Compiling Enterprise Telemetry...</div>`;

            // Fetch Master Datasets (Removed !inner to ensure all data loads even if unlinked)
            const [ordersRes, accessRes, ticketsRes, subsRes, itemsRes, promosRes] = await Promise.all([
                supabase.from('orders').select('*').order('created_at', { ascending: false }),
                supabase.from('user_access').select('*, products(name)').order('created_at', { ascending: false }),
                supabase.from('support_tickets').select('*').eq('status', 'open'),
                supabase.from('subscriptions').select('*').eq('status', 'active'),
                supabase.from('order_items').select('*, products(name)'),
                supabase.from('promotions').select('*').order('created_at', { ascending: false })
            ]);

            const orders = ordersRes.data || [];
            const access = accessRes.data || [];
            const items = itemsRes.data || [];
            const promos = promosRes.data || [];

            // Calculations
            const today = new Date().toISOString().split('T')[0];
            const todayRev = orders.filter(o => o.status === 'paid' && o.created_at.startsWith(today)).reduce((a, b) => a + b.total_amount, 0);

            // Calculate Top Selling Product
            let topProduct = { name: "No Data", count: 0 };
            if (items.length > 0) {
                const counts = items.reduce((acc, item) => {
                    const name = item.products?.name || 'Deleted Product';
                    acc[name] = (acc[name] || 0) + 1; return acc;
                }, {});
                const sortedKeys = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
                const topName = sortedKeys[0];
                topProduct = { name: topName, count: counts[topName] };
            }

            const last7Days = [...Array(7)].map((_, i) => {
                const d = new Date(); d.setDate(d.getDate() - i); return d.toISOString().split('T')[0];
            }).reverse();

            const chartData = last7Days.map(dateStr => {
                return orders.filter(o => o.status === 'paid' && o.created_at.startsWith(dateStr)).reduce((a, b) => a + b.total_amount, 0);

                                <button onclick="deletePortfolioProduct('${p.id}')" class="text-[10px] text-red-500 font-black uppercase tracking-widest hover:underline">Purge</button>

                        </div>
                    </div>
                </div>
            `).join('');
            if (!data || data.length === 0) document.getElementById('port-grid').innerHTML = `<p class="col-span-full text-center py-10 font-mono text-xs text-dark-muted">// NO_PORTFOLIO_ITEMS_FOUND</p>`;
        }
        window.deletePortfolioProduct = async (id) => { if (confirm('Purge from Portfolio Database?')) { await supabase.from('portfolio_products').delete().eq('id', id); renderPortfolio(); } };
        window.togglePortfolioStatus = async (id, status) => { await supabase.from('portfolio_products').update({ is_active: status }).eq('id', id); renderPortfolio(); };

        window.openPortfolioModal = async (id = null) => {
            document.getElementById('port-image-file-input').value = ""; const previewText = document.getElementById('port-image-preview-text');
            if (id) {
                const { data } = await supabase.from('portfolio_products').select('*').eq('id', id).single();
                const f = document.getElementById('portfolio-form');
                f.id.value = data.id; f.name.value = data.name; f.product_link.value = data.product_link;
                f.sort_order.value = data.sort_order; f.description.value = data.description;
                document.getElementById('port-existing-image-url').value = data.image_url || '';
                if (data.image_url) { previewText.classList.remove('hidden'); document.getElementById('port-image-preview-link').href = data.image_url; }
                else { previewText.classList.add('hidden'); }
            } else {
                document.getElementById('portfolio-form').reset(); document.getElementById('port-form-id').value = '';
                document.getElementById('port-existing-image-url').value = ''; previewText.classList.add('hidden');
            }
            document.getElementById('portfolio-modal').classList.remove('hidden');
        }
        document.getElementById('portfolio-form').onsubmit = async (e) => {
            e.preventDefault(); const btn = document.getElementById('port-submit-btn'); btn.disabled = true; btn.innerText = "UPLOADING...";
            const fd = new FormData(e.target); const data = Object.fromEntries(fd.entries());
            const id = data.id; delete data.id; const file = document.getElementById('port-image-file-input').files[0];
            let finalImageUrl = data.existing_image_url; delete data.image_file; delete data.existing_image_url;
            try {
                if (file) finalImageUrl = await uploadImageFile(file, 'product-images');
                data.image_url = finalImageUrl || "https://via.placeholder.com/600x400?text=No+Image";
                const { error } = id ? await supabase.from('portfolio_products').update(data).eq('id', id) : await supabase.from('portfolio_products').insert([data]);
                if (error) throw error;
                closePortfolioModal(); renderPortfolio();
            } catch (err) { alert(`Error: ${err.message}`); } finally { btn.disabled = false; btn.innerText = "Inject_Node"; }
        }
        window.closePortfolioModal = () => document.getElementById('portfolio-modal').classList.add('hidden');

        // --- 06_PROMOS ---
        async function renderPromos() {
            area.innerHTML = `
            <div class="flex justify-between items-end mb-6">
                <h3 class="font-mono text-[10px] uppercase tracking-widest text-dark-muted">Active Campaigns</h3>
                <button onclick="document.getElementById('promo-modal').classList.remove('hidden')" class="bg-accent text-black px-5 py-2.5 rounded-xl font-mono text-[10px] font-bold uppercase tracking-widest hover:brightness-110 shadow-lg transition-all active:scale-95">+ Inject_Promo</button>
            </div>
            <div class="bg-dark-surface border border-dark-border rounded-[2rem] overflow-x-auto shadow-2xl">
                <table class="w-full text-left text-sm min-w-[600px]">
                    <thead class="bg-white/5 font-mono text-[9px] uppercase tracking-widest text-dark-muted">
                        <tr><th class="p-6">Promo Code</th><th class="p-6 text-center">Discount</th><th class="p-6 text-center">Usage</th><th class="p-6 text-right">Status / Ops</th></tr>
                    </thead>
                    <tbody id="promo-rows"></tbody>
                </table>
            </div>`;

            const { data } = await supabase.from('promotions').select('*').order('created_at', { ascending: false });
            document.getElementById('promo-rows').innerHTML = (data || []).map(p => `
                <tr class="border-t border-dark-border hover:bg-white/[0.02]">
                    <td class="p-6 font-mono font-bold text-accent tracking-widest">${p.code}</td>
                    <td class="p-6 text-center font-mono">${p.discount_percent}%</td>
                    <td class="p-6 text-center font-mono text-dark-muted"><span class="text-white">${p.current_uses}</span> / ${p.max_uses}</td>
                    <td class="p-6 text-right flex justify-end items-center gap-4">
                        <span class="px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-widest ${p.is_active ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}">${p.is_active ? 'Active' : 'Disabled'}</span>
                        <button onclick="togglePromo('${p.id}', ${!p.is_active})" class="text-[9px] font-black uppercase tracking-widest ${p.is_active ? 'text-red-500 hover:text-white' : 'text-emerald-500 hover:text-white'} transition-colors">${p.is_active ? 'Revoke' : 'Restore'}</button>
                    </td>
                </tr>
            `).join('');

            if (!data || data.length === 0) document.getElementById('promo-rows').innerHTML = `<tr><td colspan="4" class="p-10 text-center font-mono text-xs text-dark-muted">No active promotional campaigns.</td></tr>`;
        }

        document.getElementById('promo-form').onsubmit = async (e) => {
            e.preventDefault(); const btn = document.getElementById('promo-btn'); btn.disabled = true; btn.innerText = "GENERATING...";
            const code = document.getElementById('promo-code').value.toUpperCase();
            const discount = parseInt(document.getElementById('promo-discount').value);
            const max = parseInt(document.getElementById('promo-max').value);
            try {
                const { error } = await supabase.from('promotions').insert([{ code: code, discount_percent: discount, max_uses: max }]);
                if (error) throw error;
                document.getElementById('promo-form').reset(); document.getElementById('promo-modal').classList.add('hidden'); renderPromos();
            } catch (err) { alert(`System Error: ${err.message}`); } finally { btn.disabled = false; btn.innerText = "Generate"; }
        };
        window.togglePromo = async (id, status) => { await supabase.from('promotions').update({ is_active: status }).eq('id', id); renderPromos(); };

        // --- 07_COMMAND CENTER ---
        async function renderCommand() {
            const { data: settings } = await supabase.from('system_settings').select('*').eq('setting_key', 'n8n_webhook_base').single();
            const webhookBase = settings?.setting_value || 'https://automation.mohammad-abujalboush.com/webhook/';

            area.innerHTML = `
                <p class="text-[10px] font-mono text-dark-muted mb-8 uppercase tracking-widest">Fire secure webhooks directly to n8n to override scheduled cron jobs.</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-dark-surface border border-emerald-500/20 p-8 rounded-[2rem] text-center shadow-[0_0_30px_rgba(16,185,129,0.05)] flex flex-col justify-between">
                        <div><h4 class="font-black text-lg mb-2">Force Wealth Screener</h4><p class="text-[10px] text-dark-muted mb-8 uppercase tracking-widest leading-relaxed">Triggers Groq + Yahoo Finance instantly.</p></div>
                        <button onclick="fireWebhook('${webhookBase}wealth-screener', this)" class="w-full bg-emerald-500/10 text-emerald-500 border border-emerald-500/50 py-4 rounded-xl font-mono text-[10px] uppercase tracking-widest font-black hover:bg-emerald-500 hover:text-black transition-all">Execute_Run</button>
                    </div>
                    <div class="bg-dark-surface border border-accent/20 p-8 rounded-[2rem] text-center shadow-[0_0_30px_rgba(56,189,248,0.05)] flex flex-col justify-between">
                        <div><h4 class="font-black text-lg mb-2">Viral Content Engine</h4><p class="text-[10px] text-dark-muted mb-8 uppercase tracking-widest leading-relaxed">Scrapes trends and updates Notion Calendar.</p></div>
                        <button onclick="fireWebhook('${webhookBase}viral-content', this)" class="w-full bg-accent/10 text-accent border border-accent/50 py-4 rounded-xl font-mono text-[10px] uppercase tracking-widest font-black hover:bg-accent hover:text-black transition-all">Execute_Run</button>
                    </div>
                    <div class="bg-dark-surface border border-purple-500/20 p-8 rounded-[2rem] text-center shadow-[0_0_30px_rgba(168,85,247,0.05)] flex flex-col justify-between">
                        <div><h4 class="font-black text-lg mb-2">Sync SaaS Subscriptions</h4><p class="text-[10px] text-dark-muted mb-8 uppercase tracking-widest leading-relaxed">Forces Lemon Squeezy to audit all user access.</p></div>
                        <button onclick="fireWebhook('${webhookBase}sync-subs', this)" class="w-full bg-purple-500/10 text-purple-500 border border-purple-500/50 py-4 rounded-xl font-mono text-[10px] uppercase tracking-widest font-black hover:bg-purple-500 hover:text-black transition-all">Execute_Run</button>
                    </div>
                </div>
            `;
        }
        window.fireWebhook = async (url, btn) => {
            const originalText = btn.innerText; btn.innerText = "FIRING_PAYLOAD..."; btn.classList.add('opacity-50', 'pointer-events-none');
            try { await fetch(url, { method: 'POST' }); btn.innerText = "SUCCESSFUL_DELIVERY"; btn.classList.replace('text-accent', 'text-white'); btn.classList.replace('text-emerald-500', 'text-white'); btn.classList.replace('text-purple-500', 'text-white'); }
            catch (e) { btn.innerText = "NO_RESPONSE_ASSUME_FIRED"; btn.classList.add('text-amber-500'); }
            setTimeout(() => { btn.innerText = originalText; btn.classList.remove('opacity-50', 'pointer-events-none', 'text-white', 'text-amber-500'); }, 3000);
        };

        // --- 08_FINANCE LEDGER ---
        async function renderFinance() {
            const { data: orders } = await supabase.from('orders').select('*');
            const { data: ledger } = await supabase.from('finance_ledger').select('*').order('created_at', { ascending: false });

            const orderRev = (orders || []).filter(o => o.status === 'paid').reduce((a, b) => a + b.total_amount, 0);
            const manualIncome = (ledger || []).filter(l => l.tx_type === 'income').reduce((a, b) => a + b.amount, 0);
            const expenses = (ledger || []).filter(l => l.tx_type === 'expense').reduce((a, b) => a + b.amount, 0);
            const totalRev = orderRev + manualIncome; const netProfit = totalRev - expenses;

            area.innerHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                    <div class="bg-dark-surface border border-dark-border p-8 rounded-[2rem] shadow-xl"><p class="text-[9px] font-mono text-dark-muted uppercase tracking-widest mb-2">Total_Revenue</p><p class="text-3xl font-black text-accent">${totalRev.toFixed(2)} JOD</p></div>
                    <div class="bg-dark-surface border border-dark-border p-8 rounded-[2rem] shadow-xl"><p class="text-[9px] font-mono text-dark-muted uppercase tracking-widest mb-2">Total_Expenses</p><p class="text-3xl font-black text-red-500">${expenses.toFixed(2)} JOD</p></div>
                    <div class="bg-dark-surface border border-emerald-500/20 p-8 rounded-[2rem] shadow-xl"><p class="text-[9px] font-mono text-dark-muted uppercase tracking-widest mb-2">Net_Profit</p><p class="text-3xl font-black text-emerald-500">${netProfit.toFixed(2)} JOD</p></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1 bg-dark-surface border border-dark-border p-8 rounded-[2rem] h-fit shadow-xl">
                        <h4 class="font-mono text-[10px] uppercase text-accent mb-6 tracking-widest border-b border-dark-border pb-3">Inject_Transaction</h4>
                        <form onsubmit="addLedgerEntry(event)" class="space-y-4">
                            <select id="l-type" class="w-full p-4 rounded-xl text-xs uppercase font-bold tracking-widest appearance-none"><option value="expense">Expense_Record (-)</option><option value="income">Income_Record (+)</option></select>
                            <input type="text" id="l-desc" placeholder="Description (e.g. Hetzner Server)" required class="w-full p-4 rounded-xl text-sm">
                            <input type="number" step="0.01" id="l-amount" placeholder="Amount (JOD)" required class="w-full p-4 rounded-xl text-sm">
                            <button type="submit" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest active:scale-95 transition-transform mt-2">Execute_Ledger_Write</button>
                        </form>
                    </div>
                    <div class="lg:col-span-2 bg-dark-surface border border-dark-border p-8 rounded-[2rem] shadow-xl">
                        <h4 class="font-mono text-[10px] uppercase text-accent mb-6 tracking-widest border-b border-dark-border pb-3">Ledger_History_Log</h4>
                        <div class="space-y-3 font-mono text-xs" id="ledger-list">
                            ${(ledger || []).length === 0 ? '<p class="text-dark-muted text-center py-10">No manual records found.</p>' : ''}
                            ${(ledger || []).map(l => `
                                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-dark-border hover:bg-white/10 transition-colors">
                                    <div class="flex flex-col"><span class="text-dark-muted text-[9px] mb-1">${l.created_at.split('T')[0]}</span><span class="font-bold uppercase tracking-widest text-white">${l.description}</span></div>
                                    <div class="flex items-center gap-6">
                                        <span class="${l.tx_type === 'income' ? 'text-emerald-500' : 'text-red-500'} font-bold">${l.tx_type === 'income' ? '+' : '-'}${l.amount}</span>
                                        <button onclick="deleteLedger('${l.id}')" class="text-red-500 hover:text-white transition-colors">✕</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
        }
        window.addLedgerEntry = async (e) => { e.preventDefault(); const tx_type = document.getElementById('l-type').value; const description = document.getElementById('l-desc').value; const amount = parseFloat(document.getElementById('l-amount').value); await supabase.from('finance_ledger').insert([{ tx_type, description, amount }]); renderFinance(); };
        window.deleteLedger = async (id) => { if (confirm('Sudo: Delete ledger entry permanently?')) { await supabase.from('finance_ledger').delete().eq('id', id); renderFinance(); } };

        // --- 09_SUPPORT HUB ---
        async function renderSupport() {
            area.innerHTML = `<h3 class="font-mono text-[10px] uppercase tracking-widest text-dark-muted mb-6">Client Support & Review Pipeline</h3><div class="space-y-4" id="ticket-list"></div>`;
            const { data } = await supabase.from('support_tickets').select('*').order('created_at', { ascending: false });
            document.getElementById('ticket-list').innerHTML = (data || []).map(t => `
                <div class="bg-dark-surface border ${t.status === 'open' ? 'border-amber-500/50 shadow-[0_0_15px_rgba(245,158,11,0.05)]' : 'border-dark-border opacity-60'} p-6 rounded-[2rem] flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-3"><span class="w-2.5 h-2.5 rounded-full ${t.status === 'open' ? 'bg-amber-500 shadow-[0_0_8px_#f59e0b]' : 'bg-emerald-500'}"></span><span class="font-mono text-xs text-accent">${t.user_email}</span></div>
                        <h4 class="font-bold text-lg mb-2">${t.subject}</h4><p class="text-sm text-dark-muted leading-relaxed">${t.message}</p>
                    </div>
                    <button onclick="closeTicket('${t.id}')" class="text-[10px] font-mono font-bold uppercase tracking-widest text-emerald-500 border border-emerald-500/20 px-6 py-3 rounded-xl bg-emerald-500/5 hover:bg-emerald-500 hover:text-black transition-colors shrink-0" ${t.status !== 'open' ? 'disabled style="display:none"' : ''}>Mark_Resolved</button>
                </div>
            `).join('');
            if (!data || data.length === 0) document.getElementById('ticket-list').innerHTML = `<p class="font-mono text-xs text-dark-muted text-center py-20 uppercase tracking-widest">Inbox Zero. All systems nominal.</p>`;
        }
        window.closeTicket = async (id) => { await supabase.from('support_tickets').update({ status: 'resolved' }).eq('id', id); renderSupport(); };

        // --- 10_SYS CONFIG ---
        async function renderSettings() {
            area.innerHTML = `<h3 class="font-mono text-[10px] uppercase tracking-widest text-dark-muted mb-6">Master System Configuration</h3>
            <div class="bg-dark-surface border border-dark-border rounded-[2rem] overflow-x-auto shadow-2xl"><table class="w-full text-left text-sm min-w-[600px]"><thead class="bg-white/5 font-mono text-[9px] uppercase tracking-widest text-dark-muted"><tr><th class="p-6">Configuration Key</th><th class="p-6">String Value</th><th class="p-6 text-right">Last Sync</th></tr></thead><tbody id="settings-rows"></tbody></table></div>`;
            const { data } = await supabase.from('system_settings').select('*').order('setting_key', { ascending: true });
            document.getElementById('settings-rows').innerHTML = (data || []).map(s => `
                <tr class="border-t border-dark-border hover:bg-white/[0.02] transition-colors">
                    <td class="p-6 font-mono text-xs text-accent uppercase tracking-widest">${s.setting_key}</td>
                    <td class="p-6 font-mono text-xs text-white max-w-[200px] truncate">${s.setting_value}</td>
                    <td class="p-6 text-right text-[10px] font-mono text-dark-muted">${s.updated_at.split('T')[0]}</td>
                </tr>
            `).join('');
            if (!data || data.length === 0) document.getElementById('settings-rows').innerHTML = `<tr><td colspan="3" class="p-10 text-center font-mono text-xs text-dark-muted">No configuration pairs found in database.</td></tr>`;
        }

    </script>
</body>

</html>
