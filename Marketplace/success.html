<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Successful | M. Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#38bdf8',
                        light: { bg: '#F8FAFC', text: '#0F172A', surface: '#FFFFFF', border: '#E2E8F0', muted: '#64748B' },
                        dark: { bg: '#0A0A0B', text: '#FFFFFF', surface: '#1A1A1B', border: 'rgba(255, 255, 255, 0.1)', muted: 'rgba(255, 255, 255, 0.4)' },
                    }
                }
            }
        }
    </script>
    <style>
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
    </style>
</head>

<body
    class="bg-light-bg text-light-text dark:bg-dark-bg dark:text-dark-text antialiased font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full text-center space-y-8 animate-in fade-in zoom-in duration-700">
        <div
            class="w-24 h-24 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center mx-auto text-4xl shadow-xl shadow-emerald-500/10 border border-emerald-500/20">
            ✓
        </div>

        <div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2 uppercase font-mono">Transaction_Success</h1>
            <p class="text-light-muted dark:text-dark-muted">Protocol complete. Your resources have been allocated and
                are now available in your personal library.</p>
        </div>

        <div
            class="bg-light-surface dark:bg-dark-surface border border-light-border dark:border-dark-border p-6 rounded-3xl space-y-4">
            <div class="flex justify-between items-center text-sm font-mono uppercase tracking-tighter">
                <span class="text-light-muted dark:text-dark-muted">Order_ID</span>
                <span id="order-id-display" class="text-accent font-bold">LOADING...</span>
            </div>
            <div class="flex justify-between items-center text-sm font-mono uppercase tracking-tighter">
                <span class="text-light-muted dark:text-dark-muted">Status</span>
                <span class="text-emerald-500 font-bold">CONFIRMED_SYSTEM_READY</span>
            </div>
        </div>

        <div class="space-y-4">
            <a href="library.html"
                class="block w-full py-4 bg-accent text-white font-extrabold rounded-2xl hover:brightness-110 shadow-lg shadow-accent/20 transition-all active:scale-95 uppercase tracking-tighter">
                ACCESS_MY_LIBRARY_
            </a>
            <a href="index.html"
                class="block w-full py-4 bg-light-surface dark:bg-dark-surface border border-light-border dark:border-dark-border text-sm font-bold rounded-2xl hover:border-accent transition-all uppercase tracking-tighter">
                Return_to_Marketplace
            </a>
        </div>

        <p class="text-[10px] text-light-muted dark:text-dark-muted font-mono uppercase">System Node: Amman // Latency:
            24ms</p>
    </div>

    <script>
        // Apply theme on load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // Display Order ID from URL
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('orderId');
        if (orderId) {
            document.getElementById('order-id-display').innerText = orderId.split('-')[0].toUpperCase();
        }
    </script>
</body>

</html>
