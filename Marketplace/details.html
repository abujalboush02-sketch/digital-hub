<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Engineered Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#38bdf8',
                        light: { bg: '#F8FAFC', text: '#0F172A', surface: '#FFFFFF', border: '#E2E8F0', muted: '#64748B' },
                        dark: { bg: '#0A0A0B', text: '#FFFFFF', surface: '#1A1A1B', border: 'rgba(255, 255, 255, 0.1)', muted: 'rgba(255, 255, 255, 0.4)' },
                    }
                }
            }
        }
    </script>
    <style>
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .cart-drawer-open {
            transform: translateX(0) !important;
        }
    </style>
</head>

<body class="bg-light-bg text-light-text dark:bg-dark-bg dark:text-dark-text antialiased font-sans min-h-screen">

    <nav
        class="sticky top-0 z-50 backdrop-blur-md bg-light-surface/80 dark:bg-dark-surface/80 border-b border-light-border dark:border-dark-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="index.html"
                class="text-sm font-medium text-light-muted dark:text-dark-muted hover:text-accent flex items-center gap-2 transition-colors font-mono uppercase">
                ← BACK_TO_SOLUTIONS
            </a>

            <div class="flex items-center gap-6">
                <div
                    class="flex items-center bg-light-bg dark:bg-dark-bg p-1 rounded-full border border-light-border dark:border-dark-border relative">
                    <button id="theme-toggle"
                        class="relative flex items-center justify-between w-16 h-8 rounded-full transition-all">
                        <div id="theme-slider"
                            class="absolute top-0 left-0 w-8 h-8 bg-accent rounded-full transition-transform duration-300 ease-in-out">
                        </div>
                        <span class="z-10 w-8 h-8 flex items-center justify-center text-xs">☀️</span>
                        <span class="z-10 w-8 h-8 flex items-center justify-center text-xs">🌙</span>
                    </button>
                </div>
                <button onclick="toggleCart(true)"
                    class="p-2 bg-light-surface dark:bg-dark-surface border border-light-border dark:border-dark-border rounded-xl transition relative hover:border-accent">
                    🛒 <span id="cart-count"
                        class="absolute -top-1 -right-1 bg-accent text-white text-[10px] font-bold px-1.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div id="cart-overlay" class="fixed inset-0 z-[100] hidden">
        <div onclick="toggleCart(false)" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div id="cart-drawer"
            class="absolute top-0 right-0 h-full w-full max-w-md bg-light-surface dark:bg-dark-surface shadow-2xl transition-transform duration-300 translate-x-full flex flex-col">
            <div class="p-6 border-b border-light-border dark:border-dark-border flex justify-between items-center">
                <h2 class="text-xl font-bold font-mono uppercase tracking-tighter">Shopping_Cart</h2>
                <button onclick="toggleCart(false)"
                    class="p-2 hover:bg-light-bg dark:hover:bg-dark-bg rounded-lg transition-colors">✕</button>
            </div>

            <div id="drawer-items" class="flex-1 overflow-y-auto p-6 space-y-4">
            </div>

            <div class="p-6 border-t border-light-border dark:border-dark-border bg-light-bg dark:bg-dark-bg/50">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-sm font-mono text-light-muted dark:text-dark-muted">TOTAL_PAYABLE</span>
                    <span id="drawer-total" class="text-2xl font-bold text-accent">0.00 JOD</span>
                </div>
                <a href="checkout.html"
                    class="block w-full text-center py-5 bg-accent text-white font-extrabold rounded-2xl hover:brightness-110 shadow-lg shadow-accent/20 transition-all active:scale-95">PROCEED_TO_CHECKOUT_</a>
                <button onclick="toggleCart(false)"
                    class="w-full mt-4 text-xs font-mono text-light-muted hover:text-accent transition uppercase tracking-tighter">Continue_Shopping</button>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-16" id="details-content">
        <div class="animate-pulse space-y-12">
            <div class="grid lg:grid-cols-2 gap-16">
                <div
                    class="aspect-video bg-light-surface dark:bg-dark-surface rounded-3xl border border-light-border dark:border-dark-border">
                </div>
                <div class="space-y-6">
                    <div class="h-10 w-3/4 bg-light-surface dark:bg-dark-surface rounded-lg"></div>
                    <div class="h-32 w-full bg-light-surface dark:bg-dark-surface rounded-lg"></div>
                    <div class="h-12 w-1/3 bg-accent/20 rounded-lg"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://dvlabpioxtyyzvhzpmyc.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2bGFicGlveHR5eXp2aHpwbXljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDY4NzUsImV4cCI6MjA4OTA4Mjg3NX0.fBM9r7WXpntVUM-qsBDQFlknRf2vMyIpJTp5ww9pzUM';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- Theme Logic ---
        const toggleBtn = document.getElementById('theme-toggle');
        const slider = document.getElementById('theme-slider');
        const setTheme = (isDark) => {
            if (isDark) { document.documentElement.classList.add('dark'); slider.style.transform = 'translateX(32px)'; localStorage.theme = 'dark'; }
            else { document.documentElement.classList.remove('dark'); slider.style.transform = 'translateX(0px)'; localStorage.theme = 'light'; }
        };
        setTheme(localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches));
        toggleBtn.addEventListener('click', () => setTheme(!document.documentElement.classList.contains('dark')));

        // --- Cart System ---
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        window.toggleCart = (show) => {
            const overlay = document.getElementById('cart-overlay');
            const drawer = document.getElementById('cart-drawer');
            if (show) {
                overlay.classList.remove('hidden');
                renderDrawer();
                setTimeout(() => drawer.classList.add('cart-drawer-open'), 10);
            } else {
                drawer.classList.remove('cart-drawer-open');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        };

        window.handleAddToCart = (id, name, price, image) => {
            cart.push({ id, name, price, image });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            window.toggleCart(true);
        };

        window.removeItemFromDrawer = (index) => {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderDrawer();
        };

        function updateCartCount() {
            document.getElementById('cart-count').innerText = cart.length;
        }

        function renderDrawer() {
            const container = document.getElementById('drawer-items');
            const totalEl = document.getElementById('drawer-total');
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-light-muted dark:text-dark-muted font-mono text-xs">LOG_EMPTY: NO_ITEMS_FOUND</div>`;
                totalEl.innerText = "0.00 JOD";
                return;
            }

            container.innerHTML = cart.map((item, index) => {
                total += parseFloat(item.price);
                return `
                    <div class="flex gap-4 p-4 bg-light-bg dark:bg-dark-bg/50 rounded-2xl border border-light-border dark:border-dark-border">
                        <img src="${item.image || 'https://via.placeholder.com/100'}" class="w-16 h-16 object-contain bg-white rounded-xl p-1 shadow-sm">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm tracking-tight">${item.name}</h4>
                            <p class="text-accent font-mono text-xs font-bold mt-1">${item.price} JOD</p>
                            <button onclick="removeItemFromDrawer(${index})" class="text-[9px] text-red-500 uppercase font-mono mt-3 hover:text-red-400 transition-colors">TERMINATE_ITEM [X]</button>
                        </div>
                    </div>
                `;
            }).join('');
            totalEl.innerText = `${total.toFixed(2)} JOD`;
        }

        // --- Fetch Detail Logic ---
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        async function fetchDetails() {
            const container = document.getElementById('details-content');
            const { data: product, error } = await supabase.from('products').select('*').eq('id', productId).single();

            if (error || !product) {
                container.innerHTML = `<div class="text-center py-20 font-mono">ERROR: RESOURCE_NOT_FOUND</div>`;
                return;
            }

            container.innerHTML = `
                <div class="grid lg:grid-cols-2 gap-16 items-start">
                    <div class="space-y-6">
                        <div class="aspect-video bg-light-surface dark:bg-dark-surface border border-light-border dark:border-dark-border rounded-3xl overflow-hidden flex items-center justify-center p-12 shadow-xl shadow-accent/5">
                            <img src="${product.image_url || 'https://via.placeholder.com/600x400'}" class="max-h-full object-contain hover:scale-105 transition duration-500">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            ${product.demo_url ? `<a href="${product.demo_url}" target="_blank" class="py-4 bg-light-surface dark:bg-dark-surface border border-light-border dark:border-dark-border rounded-2xl font-bold hover:border-accent transition-all font-mono text-xs text-center flex items-center justify-center">LIVE_PREVIEW_🔗</a>` : ''}
                            <button onclick="handleAddToCart('${product.id}', '${product.name.replace(/'/g, "\\'")}', ${product.price_jod}, '${product.image_url}')" 
                                class="py-4 bg-accent text-white rounded-2xl font-extrabold hover:brightness-110 transition-all active:scale-95 uppercase tracking-tighter">
                                ACQUIRE_FOR_${product.price_jod}_JOD
                            </button>
                        </div>
                    </div>
                    <div>
                        <span class="text-accent font-mono text-sm uppercase tracking-widest mb-4 block">Product // ${product.id.split('-')[0]}</span>
                        <h1 class="text-4xl md:text-5xl font-extrabold mb-6 tracking-tight">${product.name}</h1>
                        <p class="text-light-muted dark:text-dark-muted text-lg leading-relaxed mb-10 border-l-4 border-accent pl-6 bg-accent/5 py-4 rounded-r-xl italic">
                            ${product.full_description || product.brief_description}
                        </p>
                        <div class="space-y-10">
                            <div>
                                <h3 class="font-bold text-xl mb-6 flex items-center gap-3 font-mono uppercase tracking-tighter">
                                    <span class="w-2 h-6 bg-accent rounded-full"></span> Core_Specifications
                                </h3>
                                <ul class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    ${(product.features || []).map(f => `<li class="flex items-center gap-3 text-sm p-4 rounded-xl border border-light-border dark:border-dark-border bg-light-surface dark:bg-dark-surface">
                                        <svg class="w-5 h-5 text-accent shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                        <span class="font-medium">${f}</span></li>`).join('')}
                                </ul>
                            </div>
                            
                            <div class="p-8 bg-light-surface dark:bg-dark-surface border border-light-border dark:border-dark-border rounded-3xl relative overflow-hidden group shadow-lg">
                                <div class="absolute top-0 right-0 w-32 h-32 bg-accent/5 rounded-full -mr-16 -mt-16 transition-transform group-hover:scale-110"></div>
                                <h4 class="font-bold mb-3 text-accent font-mono text-xs uppercase tracking-tighter">Deployment Protocol</h4>
                                <p class="text-sm text-light-muted dark:text-dark-muted leading-relaxed">
                                    Digital assets are allocated to your system identifier (email) upon payment authorization. Access tokens, licensing keys, or workspace duplication protocols will be visible in your library dashboard instantly.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        updateCartCount();
        fetchDetails();
    </script>
</body>

</html>
